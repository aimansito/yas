<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Para ti, Yasmin ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Dancing+Script:wght@600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      user-select:none;
      touch-action:manipulation;
      font-family:'Jost', sans-serif;
      background:#04030f;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      text-rendering:optimizeLegibility
    }

    /* ── CANVASES ── */
    #star-canvas  { position:fixed; inset:0; z-index:0;  display:block }
    #magic-canvas { position:fixed; inset:0; z-index:20; pointer-events:none; display:block }
    #petal-canvas { position:fixed; inset:0; z-index:11; cursor:pointer }

    /* ════════════════════════
       GAME SCREEN
    ════════════════════════ */
    #game-screen {
      position:fixed; inset:0; z-index:12;
      pointer-events:none;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-start;
      padding-top: max(5vh, 36px);
      transition: opacity 1.2s, transform 1.2s
    }

    .game-title {
      font-family:'Cormorant Garamond', serif;
      font-style:italic;
      font-size:clamp(2rem, 5vw, 3rem);
      letter-spacing:.04em;
      color:#ede0ff;
      text-shadow:0 0 28px rgba(200,130,255,.7), 0 0 60px rgba(160,100,255,.35), 0 2px 8px rgba(0,0,0,.6);
      margin-bottom:.45rem;
      animation:titlePulse 4s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100%{ text-shadow:0 0 28px rgba(200,130,255,.65), 0 0 55px rgba(160,100,255,.3) }
      50%    { text-shadow:0 0 40px rgba(220,150,255,.9),  0 0 80px rgba(200,130,255,.4) }
    }

    .game-sub {
      font-size:.82rem; letter-spacing:.18em;
      text-transform:uppercase; color:#c0aee8; opacity:.9;
      font-weight:400;
      text-shadow:0 1px 6px rgba(0,0,0,.5);
    }

    /* Progress petals */
    #progress-bar {
      display:flex; gap:12px; margin-top:1.4rem;
    }
    .prog-petal {
      width:14px; height:18px;
      opacity:.28;
      filter:drop-shadow(0 0 0px transparent);
      transition:all .5s;
      background:radial-gradient(ellipse at 50% 30%, #e8c0ff 0%, #b080e0 60%, rgba(140,60,200,0) 100%);
      clip-path:polygon(50% 0%, 85% 25%, 100% 60%, 85% 90%, 50% 100%, 15% 90%, 0% 60%, 15% 25%);
      border-radius:40% 40% 50% 50%;
    }
    .prog-petal.lit {
      opacity:1;
      filter:drop-shadow(0 0 8px rgba(210,150,255,.9)) drop-shadow(0 0 18px rgba(180,100,255,.5));
    }

    #hint {
      position:fixed; bottom:max(2rem, env(safe-area-inset-bottom, 2rem));
      left:50%; transform:translateX(-50%);
      z-index:12; pointer-events:none;
      font-size:.8rem; letter-spacing:.14em;
      text-transform:uppercase; color:rgba(210,190,245,.8);
      font-weight:400;
      text-shadow:0 1px 8px rgba(0,0,0,.6);
      white-space:nowrap;
      animation:blink 2.8s ease-in-out infinite;
      transition:opacity .6s
    }
    @keyframes blink { 0%,100%{opacity:.7} 50%{opacity:.2} }

    /* ════════════════════════
       FLASH
    ════════════════════════ */
    #bloom {
      position:fixed; inset:0; z-index:50;
      background:radial-gradient(ellipse at center, #fff8ff 0%, #e8d0ff 40%, #fff 100%);
      opacity:0; pointer-events:none;
      transition:opacity .6s
    }

    /* ════════════════════════
       REVEAL SCREEN
    ════════════════════════ */
    #reveal {
      position:fixed; inset:0; z-index:30;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end;
      padding:2rem;
      padding-bottom: max(3rem, env(safe-area-inset-bottom, 3rem));
      text-align:center;
      opacity:0; pointer-events:none;
      transition:opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1);
      background:
        linear-gradient(to bottom,
          rgba(4,2,15,.95) 0%,
          rgba(4,2,15,.5)  14%,
          rgba(6,4,16,.22) 30%,
          rgba(6,4,16,.22) 60%,
          rgba(4,2,15,.75) 100%
        ),
        url("ChatGPT Image 28 jun 2026, 21_19_50.png") center/cover no-repeat;
    }
    #reveal.on { opacity:1 }

    .r-phrase {
      font-family:'Cormorant Garamond', serif;
      font-style:italic;
      font-size:clamp(1.05rem, 2.6vw, 1.45rem);
      color:#f2eaff;
      line-height:1.9;
      background:rgba(4, 2, 18, 0.68);
      border:1px solid rgba(190,140,255,.22);
      border-radius:16px;
      padding:1.4rem 2rem;
      max-width:min(88vw, 520px);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      opacity:0;
      margin-bottom:1.6rem;
      transition:opacity 1.4s ease .5s;
    }
    #reveal.on .r-phrase { opacity:1 }

    .r-divider {
      display:block;
      font-size:clamp(.85rem, 2vw, 1rem);
      letter-spacing:.5em;
      color:rgba(220,195,255,.9);
      opacity:0;
      text-shadow:0 0 14px rgba(180,130,255,.6), 0 1px 8px rgba(0,0,0,.6);
      transition:opacity 1s ease .3s;
      margin-bottom:.1rem;
    }
    #reveal.on .r-divider { opacity:1 }

    .r-name {
      display:block;
      margin-top:.7rem;
      font-family:'Dancing Script', cursive;
      font-size:clamp(2.8rem, 9vw, 5.5rem);
      font-weight:700;
      color:rgba(250,235,255,1);
      opacity:0;
      text-shadow:0 2px 20px rgba(0,0,0,.9), 0 0 36px rgba(210,140,255,.7), 0 0 70px rgba(190,110,255,.3);
      transition:opacity 1.4s ease .6s;
    }
    #reveal.on .r-name { opacity:1 }

    /* ── MOBILE ── */
    @media(max-width:768px){
      #game-screen  { padding-top:max(3.5vh, 24px) }
      .game-title   { font-size:clamp(1.6rem, 6vw, 2.2rem); letter-spacing:.02em }
      .game-sub     { font-size:.72rem; letter-spacing:.1em }
      #progress-bar { margin-top:1rem; gap:9px }
      .prog-petal   { width:12px; height:15px }
      #hint         { font-size:.7rem; letter-spacing:.1em }

      .r-phrase   { font-size:clamp(1rem, 4vw, 1.2rem); padding:1.1rem 1.4rem; margin-bottom:1.2rem }
      .r-divider  { font-size:.82rem; letter-spacing:.4em }
      .r-name     { font-size:clamp(2.4rem, 11vw, 3.4rem); margin-top:.6rem }
      #reveal     { padding:1.5rem; padding-bottom:max(2.5rem, env(safe-area-inset-bottom, 2.5rem)) }
    }
    @media(max-width:420px){
      .game-title { font-size:clamp(1.3rem, 7vw, 1.65rem) }
      .game-sub   { font-size:.65rem }
      .r-phrase   { font-size:.95rem; padding:.9rem 1.2rem }
      .r-name     { font-size:2.4rem }
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop>
    <source src="audio/cancion.mp3" type="audio/mpeg">
    <source src="audio/cancion.wav" type="audio/wav">
  </audio>

  <canvas id="star-canvas"></canvas>
  <canvas id="magic-canvas"></canvas>
  <canvas id="petal-canvas"></canvas>

  <div id="bloom"></div>

  <div id="game-screen">
    <div class="game-title">Recoge los pétalos</div>
    <div class="game-sub">un secreto te aguarda</div>
    <div id="progress-bar"></div>
  </div>

  <div id="hint">✦ Toca cada pétalo ✦</div>

  <!-- ── REVEAL ── -->
  <div id="reveal">
    <p class="r-phrase">
      &ldquo;Como el jazmín, no necesitas<br>
      llamar la atención.<br>
      Tu presencia lo hace sola.&rdquo;
    </p>
    <span class="r-divider">✦ &nbsp; ✦ &nbsp; ✦</span>
    <span class="r-name">Yasmin</span>
  </div>

  <script>
  // ════════════════════════════════════════
  //  UTILS
  // ════════════════════════════════════════
  const isMobile = window.matchMedia('(max-width:768px)').matches;
  let W, H;

  // ════════════════════════════════════════
  //  STARFIELD
  // ════════════════════════════════════════
  const sc  = document.getElementById('star-canvas');
  const sct = sc.getContext('2d');

  const STARS = (() => {
    let s = 42;
    const rnd = () => { s = (s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; };
    return Array.from({length:220}, () => ({
      px:rnd(), py:rnd(),
      r: rnd()*1.4+0.3,
      a: rnd()*0.55+0.3,
      ts:rnd()*0.012+0.004,
      to:rnd()*Math.PI*2,
      col:rnd()>.85?'#d0c0ff':(rnd()>.7?'#ffe8f0':'#ffffff')
    }));
  })();

  const shooters = [];
  function spawnShooter() {
    if (Math.random() > 0.007) return;
    const angle = Math.PI/6 + Math.random()*Math.PI/6;
    shooters.push({
      x:Math.random()*W, y:Math.random()*H*.35,
      len:80+Math.random()*120, speed:8+Math.random()*10,
      vx:Math.cos(angle), vy:Math.sin(angle),
      life:1, decay:.018+Math.random()*.012
    });
  }

  function drawSky(now) {
    const bg = sct.createRadialGradient(W*.35, H*.25, 0, W*.5, H*.5, Math.max(W,H)*.85);
    bg.addColorStop(0,   '#0e0828');
    bg.addColorStop(0.5, '#06041a');
    bg.addColorStop(1,   '#04030f');
    sct.fillStyle = bg;
    sct.fillRect(0,0,W,H);

    [{x:.22,y:.28,rx:.55,ry:.32,c:'rgba(90,50,180,.15)'},
     {x:.72,y:.68,rx:.48,ry:.35,c:'rgba(160,50,110,.12)'},
     {x:.50,y:.12,rx:.4, ry:.28,c:'rgba(50,70,200,.10)'}
    ].forEach(n=>{
      const g = sct.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,Math.max(W,H)*Math.max(n.rx,n.ry));
      g.addColorStop(0, n.c); g.addColorStop(1,'rgba(0,0,0,0)');
      sct.fillStyle=g;
      sct.beginPath(); sct.ellipse(n.x*W,n.y*H,n.rx*W,n.ry*H,0,0,Math.PI*2); sct.fill();
    });

    STARS.forEach(s=>{
      const alpha = s.a*(.65+.35*Math.sin(now*s.ts*60+s.to));
      sct.globalAlpha = Math.max(0,alpha);
      sct.shadowBlur  = s.r>1.2?8:0;
      sct.shadowColor = s.col;
      sct.fillStyle   = s.col;
      sct.beginPath(); sct.arc(s.px*W,s.py*H,s.r,0,Math.PI*2); sct.fill();
      sct.globalAlpha = 1; sct.shadowBlur = 0;
    });

    spawnShooter();
    for (let i=shooters.length-1; i>=0; i--) {
      const sh = shooters[i];
      const tail = sct.createLinearGradient(sh.x,sh.y,sh.x-sh.vx*sh.len,sh.y-sh.vy*sh.len);
      tail.addColorStop(0, `rgba(220,210,255,${sh.life*.85})`);
      tail.addColorStop(.4,`rgba(180,160,255,${sh.life*.35})`);
      tail.addColorStop(1, 'rgba(0,0,0,0)');
      sct.beginPath(); sct.moveTo(sh.x,sh.y);
      sct.lineTo(sh.x-sh.vx*sh.len, sh.y-sh.vy*sh.len);
      sct.strokeStyle=tail; sct.lineWidth=1.5; sct.stroke();
      sh.x+=sh.vx*sh.speed; sh.y+=sh.vy*sh.speed; sh.life-=sh.decay;
      if(sh.life<=0||sh.x>W+50||sh.y>H+50) shooters.splice(i,1);
    }
  }

  // ════════════════════════════════════════
  //  PARTICLES
  // ════════════════════════════════════════
  const mc  = document.getElementById('magic-canvas');
  const mcx = mc.getContext('2d');
  const pCl = ['#c090ff','#e0c0ff','#ffffff','#f0c0e8','#f8d0ff','#d0a0ff'];
  let pts = [];

  function hx(h){
    const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
    return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:[255,255,255];
  }

  class Pt {
    constructor(x,y,big){
      this.x=x; this.y=y;
      this.r=big?Math.random()*5+2:Math.random()*2+.5;
      this.c=pCl[Math.floor(Math.random()*pCl.length)];
      const a=Math.random()*Math.PI*2, sp=big?Math.random()*14+4:Math.random()*.6+.1;
      this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp-(big?2:0);
      this.life=1; this.decay=big?Math.random()*.012+.005:Math.random()*.004+.002;
      this.g=big?.07:0;
    }
    update(){
      this.x+=this.vx; this.y+=this.vy; this.vy+=this.g;
      if(!this.g){ this.vx+=(Math.random()-.5)*.08 }else{ this.vx*=.98; this.vy*=.98 }
      this.life-=this.decay;
    }
    draw(){
      mcx.beginPath(); mcx.arc(this.x,this.y,this.r,0,Math.PI*2);
      mcx.shadowBlur=9; mcx.shadowColor=this.c;
      const[r,g,b]=hx(this.c);
      mcx.fillStyle=`rgba(${r},${g},${b},${Math.max(0,this.life)})`;
      mcx.fill(); mcx.shadowBlur=0;
    }
  }
  function burst(x,y){ for(let i=0;i<28;i++) pts.push(new Pt(x,y,false)) }
  function bigBoom(x,y){ for(let i=0;i<380;i++) pts.push(new Pt(x,y,true)) }
  function amb(){ if(pts.length<60&&Math.random()>.72) pts.push(new Pt(Math.random()*mc.width,mc.height+5)) }

  // ════════════════════════════════════════
  //  PETAL GAME
  // ════════════════════════════════════════
  const cv  = document.getElementById('petal-canvas');
  const ctx = cv.getContext('2d');

  // Predefined spread positions (relative to screen)
  const PETAL_DEFS = [
    {px:.18, py:.22},
    {px:.54, py:.16},
    {px:.82, py:.27},
    {px:.30, py:.48},
    {px:.68, py:.44},
    {px:.15, py:.67},
    {px:.58, py:.68},
  ];
  const PETAL_COUNT = PETAL_DEFS.length;

  // Petal hues (pink-purple range)
  const HUES = [310, 290, 325, 305, 315, 295, 320];

  let petals = [];
  let collected = 0;
  let gameWon = false;
  let t = 0;

  class Petal {
    constructor(def, hue, idx) {
      this.baseX  = def.px * W + (Math.random()-.5)*W*.06;
      this.baseY  = def.py * H + (Math.random()-.5)*H*.04;
      this.x      = this.baseX;
      this.y      = this.baseY;
      this.hue    = hue;
      this.idx    = idx;
      this.size   = (isMobile ? 26 : 20) + Math.random()*8;
      this.rot    = Math.random()*Math.PI*2;
      this.rotSpd = (Math.random()-.5)*.008;
      this.phase  = Math.random()*Math.PI*2;
      this.alpha  = 0;
      this.done   = false;
    }

    update(t) {
      if(this.done) return;
      if(this.alpha < 1) this.alpha = Math.min(1, this.alpha + .025);
      this.x = this.baseX + Math.sin(t*.6 + this.phase)*12;
      this.y = this.baseY + Math.sin(t*.4 + this.phase*1.4)*7;
      this.rot += this.rotSpd;
    }

    draw() {
      if(this.done || this.alpha <= 0) return;
      const s = this.size;
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);

      // Outer glow
      ctx.shadowBlur  = 22;
      ctx.shadowColor = `hsla(${this.hue}, 80%, 80%, .7)`;

      // Petal body — teardrop bezier
      const grad = ctx.createRadialGradient(0, -s*.25, s*.05, 0, 0, s);
      grad.addColorStop(0,   `hsla(${this.hue+18}, 85%, 96%, 1)`);
      grad.addColorStop(.45, `hsla(${this.hue},    78%, 82%, .95)`);
      grad.addColorStop(1,   `hsla(${this.hue-12}, 65%, 66%, .15)`);

      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.bezierCurveTo( s*.58, -s*.65,  s*.58,  s*.28, 0,  s*.48);
      ctx.bezierCurveTo(-s*.58,  s*.28, -s*.58, -s*.65, 0, -s);
      ctx.fillStyle = grad;
      ctx.fill();

      // Center shimmer line
      ctx.beginPath();
      ctx.moveTo(0, -s*.75);
      ctx.lineTo(0,  s*.3);
      ctx.strokeStyle = `hsla(${this.hue+30}, 90%, 97%, .35)`;
      ctx.lineWidth   = .8;
      ctx.setLineDash([]);
      ctx.stroke();

      ctx.restore();
    }

    isHit(px, py) {
      return !this.done && Math.hypot(px - this.x, py - this.y) < this.size * (isMobile ? 1.9 : 1.5);
    }
  }

  function buildPetals() {
    petals = [];
    collected = 0;
    PETAL_DEFS.forEach((def, i) => petals.push(new Petal(def, HUES[i], i)));
  }

  // Progress bar
  const pb = document.getElementById('progress-bar');
  PETAL_DEFS.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className='prog-petal'; d.id='pp-'+i; pb.appendChild(d);
  });

  function drawPetals() {
    if(gameWon) return;
    t += .025;
    ctx.clearRect(0,0,W,H);
    petals.forEach(p => { p.update(t); p.draw(); });
    requestAnimationFrame(drawPetals);
  }

  // Touch / click
  function handleTap(ex, ey) {
    if(gameWon) return;
    for(let i=0; i<petals.length; i++) {
      const p = petals[i];
      if(p.isHit(ex, ey)) {
        p.done = true;
        burst(p.x, p.y);
        collected++;
        const dot = document.getElementById('pp-'+i);
        if(dot) dot.classList.add('lit');
        if(collected >= PETAL_COUNT) setTimeout(win, 400);
        return;
      }
    }
  }

  cv.addEventListener('mousedown', e => handleTap(e.clientX, e.clientY));
  cv.addEventListener('touchstart', e => {
    e.preventDefault();
    handleTap(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});

  // Resize
  function resize() {
    W = sc.width = cv.width = mc.width = innerWidth;
    H = sc.height = cv.height = mc.height = innerHeight;
    if(!gameWon) buildPetals();
  }
  window.addEventListener('resize', resize);

  // ════════════════════════════════════════
  //  WIN
  // ════════════════════════════════════════
  const bgMusic  = document.getElementById('bg-music');
  const gameScr  = document.getElementById('game-screen');
  const hintEl   = document.getElementById('hint');
  const bloomEl  = document.getElementById('bloom');
  const revealEl = document.getElementById('reveal');

  function win() {
    gameWon = true;
    bigBoom(W/2, H/2);
    bgMusic.play().catch(()=>{});

    gameScr.style.opacity = '0';
    gameScr.style.transform = 'scale(.93)';
    gameScr.style.pointerEvents = 'none';
    hintEl.style.opacity = '0';

    bloomEl.style.opacity = '1';
    setTimeout(()=>{
      bloomEl.style.opacity = '0';
      revealEl.classList.add('on');
      revealEl.style.pointerEvents = 'all';
    }, 650);

    setTimeout(()=>{
      gameScr.style.display = 'none';
      hintEl.style.display  = 'none';
      cv.style.display      = 'none';
      ctx.clearRect(0,0,W,H);
    }, 1600);
  }

  // ════════════════════════════════════════
  //  MAIN LOOP
  // ════════════════════════════════════════
  function mainLoop() {
    const now = Date.now()*.001;
    sct.clearRect(0,0,W,H);
    drawSky(now);

    mcx.clearRect(0,0,mc.width,mc.height);
    amb();
    for(let i=pts.length-1; i>=0; i--) {
      pts[i].update();
      if(pts[i].life<=0) pts.splice(i,1);
      else pts[i].draw();
    }
    requestAnimationFrame(mainLoop);
  }

  // ════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════
  resize();
  mainLoop();
  drawPetals();
  </script>
</body>
</html>
